<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TraceLog - AI Agent Observability</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <h1 id="nav-home">
      <div class="logo">TL</div>
      TraceLog
    </h1>
    <div class="header-actions">
      <button class="btn" id="btn-upload">Upload Trace</button>
      <button class="btn btn-primary" id="btn-load-sample">Load Sample</button>
    </div>
  </header>

  <div class="container" id="app"></div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="upload-modal" style="display:none">
    <div class="modal">
      <h3>Upload Trace File</h3>
      <div class="drop-zone" id="drop-zone">
        Drop a JSON file here or click to browse
        <input type="file" id="file-input" accept=".json" style="display:none">
      </div>
      <div id="upload-status"></div>
      <div class="modal-actions">
        <button class="btn" id="btn-close-modal">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
